spring:
  application:
    name: ordem-servico

server:
  port: 8081

  # Perfil padrao usa H2 em memoria para demo/apresentacao
  # Para usar MySQL, iniciar com: --spring.profiles.active=mysql
  datasource:
    url: jdbc:h2:mem:orderflow_os;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

---
# Perfil MySQL - ativar com --spring.profiles.active=mysql
spring:
  config:
    activate:
      on-profile: mysql

  datasource:
    url: jdbc:mysql://localhost:3306/orderflow_os?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: "123Senai@!"
    driver-class-name: com.mysql.cj.jdbc.Driver

  h2:
    console:
      enabled: false

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect